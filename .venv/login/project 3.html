<!DOCTYPE html>
<html>
<head>

<title>Weather App</title>

<style>

body{
    background:linear-gradient(135deg,#2563eb,#0f172a);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
}

.weather-card{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:320px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#e2e8f0;
    margin-top:20px;
}

button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.weather-info{
    margin-top:20px;
}

</style>

</head>

<body>

<div class="weather-card">

<h1>☁️ Weather App</h1>

<input type="text" id="city" placeholder="Enter city">

<button onclick="getWeather()">Search</button>

<div class="weather-info" id="weatherInfo">

<h2>Mumbai</h2>
<p>🌡️ 30°C</p>
<p>☀️ Sunny</p>

</div>

</div>

<script>

function getWeather(){

    let city = document.getElementById("city").value;
    let weatherInfo = document.getElementById("weatherInfo");

    weatherInfo.innerHTML = `
    
    <h2>${city}</h2>
    <p>🌡️ 28°C</p>
    <p>☁️ Cloudy</p>

    `;

}

</script>

</body>
</html>
