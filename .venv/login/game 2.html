<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rock Paper Scissors</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.game-container{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:25px;
    text-align:center;
    width:400px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    margin-bottom:25px;
    font-size:40px;
}

.choices{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
}

button{
    width:90px;
    height:90px;
    border:none;
    border-radius:50%;
    font-size:35px;
    cursor:pointer;
    background:#2563eb;
    color:white;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    background:#1d4ed8;
}

.result{
    margin-top:20px;
}

.result h2{
    margin:10px 0;
}

.score{
    display:flex;
    justify-content:space-around;
    margin-top:30px;
    font-size:20px;
}

</style>

</head>

<body>

<div class="game-container">

<h1>✊📄✂️</h1>

<div class="choices">

<button onclick="play('rock')">✊</button>

<button onclick="play('paper')">📄</button>

<button onclick="play('scissors')">✂️</button>

</div>

<div class="result">

<h2 id="playerChoice">You: -</h2>

<h2 id="computerChoice">AI: -</h2>

<h2 id="winner">Choose your move!</h2>

</div>

<div class="score">

<p>👤 You: <span id="playerScore">0</span></p>

<p>🤖 AI: <span id="computerScore">0</span></p>

</div>

</div>

<script>

let playerScore = 0;
let computerScore = 0;

function play(playerChoice){

    let choices = ["rock","paper","scissors"];

    let computerChoice = choices[Math.floor(Math.random()*3)];

    document.getElementById("playerChoice").innerHTML =
    "You: " + emoji(playerChoice);

    document.getElementById("computerChoice").innerHTML =
    "AI: " + emoji(computerChoice);

    let result = "";

    if(playerChoice === computerChoice){

        result = "😎 It's a Draw!";

    }

    else if(

        (playerChoice === "rock" && computerChoice === "scissors") ||

        (playerChoice === "paper" && computerChoice === "rock") ||

        (playerChoice === "scissors" && computerChoice === "paper")

    ){

        result = "🎉 You Win!";
        playerScore++;

    }

    else{

        result = "🤖 AI Wins!";
        computerScore++;

    }

    document.getElementById("winner").innerHTML = result;

    document.getElementById("playerScore").innerHTML = playerScore;

    document.getElementById("computerScore").innerHTML = computerScore;

}

function emoji(choice){

    if(choice === "rock") return "✊";

    if(choice === "paper") return "📄";

    if(choice === "scissors") return "✂️";

}

</script>

</body>
</html>
